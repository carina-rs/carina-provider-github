name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin carina-provider-github
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../carina-provider-github-${{ github.ref_name }}-${{ matrix.target }}.tar.gz carina-provider-github

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: carina-provider-github-${{ matrix.target }}
          path: carina-provider-github-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Build
        run: cargo build --release --target wasm32-wasip2 --bin carina-provider-github

      - name: Optimize WASM with vela
        run: |
          cargo install --git https://github.com/mizzy/vela vela-cli --quiet
          vela optimize target/wasm32-wasip2/release/carina-provider-github.wasm -o target/wasm32-wasip2/release/carina-provider-github.wasm

      - name: Package
        run: |
          cp target/wasm32-wasip2/release/carina-provider-github.wasm carina-provider-github-${{ github.ref_name }}.wasm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: carina-provider-github-wasm
          path: carina-provider-github-${{ github.ref_name }}.wasm

  release:
    name: Create Release
    needs: [build, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            carina-provider-github-*.tar.gz
            carina-provider-github-*.wasm
          generate_release_notes: true
